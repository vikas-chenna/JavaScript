<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo List | Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style></style>
  <body>
    <div class="main-container">
      <div id="userInput-Container">
        <div class="left">
          <input
            type="text"
            name="userInput"
            id="userInput"
            placeholder="Enter Task Here"
          />
          <div class="radioButtons">
            <input type="radio" name="Priority" id="high" value="High" />
            <label for="high">High</label>
            <input
              type="radio"
              name="Priority"
              id="normal"
              value="Normal"
              checked
            />
            <label for="normal">Normal</label>
            <input type="radio" name="Priority" id="low" value="Low" />
            <label for="low">Low</label>
          </div>
        </div>
        <div class="right">
          <button id="addbtn">Add Task</button>
        </div>
      </div>
      <div id="search-Wrapper">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search tasks by text or priority..."
        />
      </div>
      <div id="userTaskdisplay-Container"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
