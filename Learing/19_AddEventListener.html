<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>htnml Events</title>
  </head>
  <body style="background-color: #414141; color: aliceblue">
    <h2>Amazing image</h2>
    <div>
      <ul id="images">
        <li>
          <img
            width="200px"
            id="photoshop"

        </li>
        <li>

  <script>
    // document.getElementById("owl").addEventListener('click',function(){
    //     alert("Hello World ");
    // },false)

    // in this example when we click on any li it will print "clickeed insiode ul"
    // and when we click on owl first it will print "clicked on OWL" then it will print "clickeed insiode ul"  goes from inside to outside

    document.getElementById("images").addEventListener(
      "click",
      function () {
        // alert("clickedd inside OWL");
        //  console.log("Clicked Inside UL");
      },
      false,
    );

    document.getElementById("owl").addEventListener(
      "click",
      function () {
        // console.log("Clicked on OWL");
      },
      false,
    );

    //but when we write ture when we click on owl first it will print "clickeed insiode ul" then it will print "clicked on OWL"  event propagation goes from outside to inside

    document.getElementById("images").addEventListener(
      "click",
      function () {
        // alert("clickedd inside OWL");
        //   console.log("Clicked Inside UL");
      },
      true,
    );

    document.getElementById("owl").addEventListener(
      "click",
      function () {
        // console.log("Clicked on OWL");
      },
      true,
    );

    // to stop event propagation

    document.getElementById("images").addEventListener(
      "click",
      function () {
        // console.log("Clicked Inside UL");
      },
      false,
    );

    document.getElementById("owl").addEventListener(
      "click",
      function (e) {
        // console.log("Clicked on OWL");
        //e.stopPropagation();
      },
      false,
    );

    document.getElementById("google").addEventListener("click", function (e) {
      e.preventDefault();
      e.stopPropagation();
      console.log("clicked on Google");
    });

    //delete li one by one buyt when we click on google it will remove all items

    document.getElementById("images").addEventListener("click", function (e) {
    //   console.log(e.target.tagName);
    //   console.log(e.target.id);
    //   let removeIt = e.target.parentNode;
    //   removeIt.remove();
    });

    // to  remove that problem we can put validation that when i click on img that time only we have to remove
    document.getElementById("images").addEventListener("click", function (e) {
        if(e.target.tagName === 'IMG'){
            let removeIt = e.target.parentNode
            removeIt.remove();
        }
    });
  </script>
</html>
